<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Atvaltas</title>
</head>
<body class="d-flex justify-content-center align-items-center">
    
   
    <div class="card text-center mb-3 container mt-4" style="width: 18rem;">
        <div class="card-body">
            <h2 class="card-title">Átváltás 💸💸</h2>
            <p class="card-text mt-3">
                <label><b>Összeg (HUF):</b></label>
                <input type="number" id="amount" placeholder="5000">
    
                <label class="mt-3"><b>Valuta:</b></label>
                <select id="currency">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="GBP">GBP</option>
                </select>
            </p>
            <button onclick="atvaltas()" class="form-control"><b>ÁTVÁLTÁS💰</b></button>
        </div>
        <h4 id="result" class="bg-success-subtle border border-success form-control"></h4>
  </div>


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
